name: Claims Performance Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Performance scenario to run (smoke, load, stress, spike)'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - load
          - stress
          - spike

jobs:
  performance-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install JMeter
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "JMETER_HOME=$PWD/apache-jmeter-5.6.3" >> $GITHUB_ENV
          echo "$PWD/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Determine Scenario
        id: set-scenario
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "SCENARIO=smoke" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" == "push" ]; then
            echo "SCENARIO=load" >> $GITHUB_ENV
          else
            echo "SCENARIO=${{ github.event.inputs.scenario }}" >> $GITHUB_ENV
          fi

      - name: Run Performance Tests
        run: |
          pytest tests/ --scenario=${{ env.SCENARIO }} --junitxml=target/reports/test-results.xml
        env:
          PARABANK_BASE_URL: ${{ secrets.PARABANK_BASE_URL }}
          PARABANK_USERNAME: ${{ secrets.PARABANK_USERNAME }}
          PARABANK_PASSWORD: ${{ secrets.PARABANK_PASSWORD }}

      - name: Archive JMeter Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-results-${{ env.SCENARIO }}
          path: |
            target/results/*.jtl
            target/reports/
